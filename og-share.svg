<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0c10"/>
  <radialGradient id="g1" cx="35%" cy="40%" r="65%">
    <stop offset="0%" stop-color="#14161c"/>
    <stop offset="100%" stop-color="#0a0c10"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Stars -->
  <circle cx="95" cy="70" r="1" fill="#f0ebe4" opacity="0.3"/>
  <circle cx="280" cy="40" r="0.8" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="460" cy="95" r="1.1" fill="#f0ebe4" opacity="0.18"/>
  <circle cx="640" cy="50" r="0.7" fill="#f0ebe4" opacity="0.3"/>
  <circle cx="780" cy="85" r="1" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="920" cy="35" r="0.9" fill="#f0ebe4" opacity="0.25"/>
  <circle cx="1060" cy="70" r="1.1" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="180" cy="155" r="0.6" fill="#f0ebe4" opacity="0.2"/>
  <circle cx="400" cy="170" r="0.8" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="700" cy="140" r="0.7" fill="#f0ebe4" opacity="0.22"/>
  <circle cx="980" cy="160" r="0.9" fill="#f0ebe4" opacity="0.15"/>

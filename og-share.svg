  <circle cx="480" cy="540" r="0.6" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="670" cy="490" r="1" fill="#f0ebe4" opacity="0.08"/>
  <circle cx="880" cy="550" r="0.7" fill="#f0ebe4" opacity="0.15"/>
  <circle cx="1080" cy="510" r="0.8" fill="#f0ebe4" opacity="0.1"/>
  <circle cx="1030" cy="290" r="0.6" fill="#f0ebe4" opacity="0.12"/>
  <circle cx="830" cy="370" r="0.9" fill="#f0ebe4" opacity="0.08"/>

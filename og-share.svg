  <circle cx="580" cy="470" r="0.7" fill="#f0ebe4" opacity="0.1"/>

  <!-- Breathing orb -->
  <radialGradient id="orb" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(125,155,138,0.07)"/>
    <stop offset="60%" stop-color="rgba(125,155,138,0.03)"/>

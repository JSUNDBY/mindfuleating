  </radialGradient>
  <circle cx="920" cy="300" r="200" fill="url(#orb)"/>
  <circle cx="920" cy="300" r="120" fill="none" stroke="rgba(125,155,138,0.06)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="80" fill="none" stroke="rgba(125,155,138,0.04)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="40" fill="none" stroke="rgba(125,155,138,0.03)" stroke-width="0.8"/>
  <circle cx="920" cy="300" r="6" fill="rgba(125,155,138,0.15)"/>

  <!-- Film grain -->
  <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="1" height="1" fill="rgba(240,235,228,0.008)"/>
    <rect x="2" y="2" width="1" height="1" fill="rgba(240,235,228,0.005)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Brand -->
  <text x="100" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#7d9b8a" letter-spacing="4.5" font-weight="400">SUPERTHOUGHTS</text>

  <!-- Sage accent dash -->
  <rect x="100" y="240" width="45" height="2" rx="1" fill="#7d9b8a" opacity="0.7"/>

  <!-- Title -->
  <text x="100" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="64" fill="#f0ebe4" font-weight="400" font-style="italic">Mindful Eating</text>

  <!-- Subtitle -->
  <text x="103" y="365" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#a09994" font-weight="300" letter-spacing="0.3">Change your relationship with food.</text>
  <text x="103" y="395" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#a09994" font-weight="300" letter-spacing="0.3">No diets. No restriction. Just awareness.</text>

  <!-- Divider -->
  <line x1="100" y1="430" x2="600" y2="430" stroke="rgba(240,235,228,0.06)" stroke-width="1"/>

  <!-- Stats -->
  <text x="100" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#d4a853" letter-spacing="1.5" font-weight="500">7 GUIDED SESSIONS</text>
  <circle cx="290" cy="466" r="1.5" fill="#5c5651"/>
  <text x="310" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#7d9b8a" letter-spacing="1.5" font-weight="500">LIFETIME ACCESS</text>
  <circle cx="480" cy="466" r="1.5" fill="#5c5651"/>
  <text x="500" y="470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#b8929a" letter-spacing="1.5" font-weight="500">$49 ONE-TIME</text>

  <!-- CTA -->
  <rect x="100" y="500" width="240" height="40" rx="3" fill="none" stroke="#7d9b8a" stroke-width="1" opacity="0.5"/>
  <text x="138" y="526" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#7d9b8a" letter-spacing="2.5" font-weight="500">FREE SESSION INSIDE</text>

  <!-- Bottom glow line -->
  <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="20%" stop-color="#7d9b8a" stop-opacity="0.3"/>
    <stop offset="80%" stop-color="#7d9b8a" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>
  <rect x="0" y="626" width="1200" height="4" fill="url(#bottomLine)"/>
